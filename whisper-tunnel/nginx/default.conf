# TLS reverse proxy for Happy Dev + Whisper STT
# Terminates HTTPS and forwards to host services over HTTP

# WebSocket support (needed for Expo hot reload)
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Log format with request body size (for measuring audio uploads)
log_format whisper '$remote_addr [$time_local] "$request" '
                   '$status req=$request_length resp=$body_bytes_sent '
                   'upload=$content_length';

# CORS — whitelist origins that may call Whisper STT
map $http_origin $whisper_cors_origin {
    default "";
    "https://happy.seas.house"     $http_origin;
    "https://happy-dev.seas.house" $http_origin;
}

# Happy Dev (Expo web dev server)
server {
    listen 443 ssl;
    server_name happy-dev.seas.house;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://host.docker.internal:8081;
        proxy_http_version 1.1;

        # WebSocket upgrade (Expo hot reload)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for dev server / WebSocket
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# Whisper STT API
server {
    listen 443 ssl;
    server_name whisper.seas.house;
    access_log /var/log/nginx/access.log whisper;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Audio uploads can be large
    client_max_body_size 50m;

    # Only expose the transcription endpoint — block everything else
    location = /v1/audio/transcriptions {
        # CORS — the upstream only sets headers on OPTIONS, not on actual responses.
        # Safari requires Access-Control-Allow-Origin on every response.
        add_header Access-Control-Allow-Origin $whisper_cors_origin always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        # Handle preflight directly at nginx level
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $whisper_cors_origin;
            add_header Access-Control-Allow-Methods "POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Access-Control-Max-Age 600;
            return 204;
        }

        proxy_pass http://whisper:8000;
        proxy_http_version 1.1;

        # Hide upstream CORS headers to avoid duplicates
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Whisper transcription can take a few seconds
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Reject everything else
    location / {
        return 444;
    }
}

# Catch-all: reject unknown hosts
server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    return 444;
}
