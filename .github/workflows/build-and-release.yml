name: Build and Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/happy

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Build happy-wire
        run: yarn workspace @slopus/happy-wire build

      - name: Build modules
        run: |
          yarn workspace happy build &
          yarn workspace happy-agent build &
          yarn workspace happy-server build &
          wait

      - name: Typecheck happy-app
        run: yarn workspace happy-app typecheck

      - name: Pack happy-cli
        run: yarn workspace happy pack

      - name: Pack happy-agent
        run: yarn workspace happy-agent pack

      - name: Upload CLI package
        uses: actions/upload-artifact@v4
        with:
          name: happy-cli-package
          path: packages/happy-cli/*.tgz

      - name: Upload Agent package
        uses: actions/upload-artifact@v4
        with:
          name: happy-agent-package
          path: packages/happy-agent/*.tgz

  docker:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: server-standalone
            dockerfile: Dockerfile
          - image: server
            dockerfile: Dockerfile.server
          - image: webapp
            dockerfile: Dockerfile.webapp
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=pr
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}
            REVENUE_CAT_STRIPE=${{ secrets.REVENUE_CAT_STRIPE }}

  release:
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download CLI package
        uses: actions/download-artifact@v4
        with:
          name: happy-cli-package
          path: artifacts/

      - name: Download Agent package
        uses: actions/download-artifact@v4
        with:
          name: happy-agent-package
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tgz
          body: |
            ## Docker Images

            ```bash
            # Standalone server (recommended, no external dependencies)
            docker pull ${{ env.IMAGE_PREFIX }}/server-standalone:${{ github.ref_name }}

            # Full server (requires PostgreSQL + Redis)
            docker pull ${{ env.IMAGE_PREFIX }}/server:${{ github.ref_name }}

            # Web app
            docker pull ${{ env.IMAGE_PREFIX }}/webapp:${{ github.ref_name }}
            ```

            ## CLI & Agent

            Download the `.tgz` files below and install with:
            ```bash
            npm install -g ./happy-*.tgz
            npm install -g ./happy-agent-*.tgz
            ```
