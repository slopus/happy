name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'packages/happy-app/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/happy-app/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

env:
  APP_ENV: preview

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo prebuild
        working-directory: packages/happy-app
        run: pnpm prebuild

      - name: Build Debug APK
        working-directory: packages/happy-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Find APK
        id: find-apk
        run: |
          APK_PATH=$(find packages/happy-app/android -name "*.apk" -type f 2>/dev/null | head -1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK
        if: steps.find-apk.outputs.APK_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: happy-app-android-debug-apk
          path: ${{ steps.find-apk.outputs.APK_PATH }}
          retention-days: 7
