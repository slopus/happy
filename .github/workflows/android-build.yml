name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  repository_dispatch:
    types: [upstream-tag]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream tags
        run: |
          git remote add upstream https://github.com/slopus/happy.git
          git fetch upstream tags --depth=1

      - name: Check if this is an upstream tag
        id: check_tag
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          echo "Current tag: $CURRENT_TAG"

          UPSTREAM_TAGS=$(git ls-remote --tags upstream 2>/dev/null | awk '{print $2}' | sed 's|refs/tags/||' | head -20)
          echo "Upstream tags: $UPSTREAM_TAGS"

          if echo "$UPSTREAM_TAGS" | grep -q "^${CURRENT_TAG}$"; then
            echo "IS_UPSTREAM_TAG=true" >> $GITHUB_OUTPUT
          else
            echo "IS_UPSTREAM_TAG=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Java 17
        if: steps.check_tag.outputs.IS_UPSTREAM_TAG == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        if: steps.check_tag.outputs.IS_UPSTREAM_TAG == 'true'
        uses: android-actions/setup-android@v3

      - name: Setup Node.js 20
        if: steps.check_tag.outputs.IS_UPSTREAM_TAG == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        if: steps.check_tag.outputs.IS_UPSTREAM_TAG == 'true'
        run: corepack enable

      - name: Get pnpm store directory
        if: steps.check_tag.outputs.IS_UPSTREAM_TAG == 'true'
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Setup pnpm cache
        if: steps.check_tag.outputs.IS_UPSTREAM_TAG == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        if: steps.check_tag.outputs.IS_UPSTREAM_TAG == 'true'
        run: pnpm install

      - name: Expo prebuild
        if: steps.check_tag.outputs.IS_UPSTREAM_TAG == 'true'
        run: pnpm run --filter happy-app prebuild

      - name: Configure Gradle
        if: steps.check_tag.outputs.IS_UPSTREAM_TAG == 'true'
        run: |
          cat >> packages/happy-app/android/gradle.properties << EOF

          org.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          org.gradle.parallel=true
          EOF

      - name: Build Release APK
        if: steps.check_tag.outputs.IS_UPSTREAM_TAG == 'true'
        working-directory: packages/happy-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -x lint

      - name: Get version
        if: steps.check_tag.outputs.IS_UPSTREAM_TAG == 'true'
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload to Release
        if: steps.check_tag.outputs.IS_UPSTREAM_TAG == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          files: packages/happy-app/android/app/build/outputs/apk/release/app-release.apk
          name: Android APK ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
