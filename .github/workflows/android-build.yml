name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 启用 Corepack（必须，项目强制要求）
      - name: Enable Corepack
        run: corepack enable

      # 直接用项目指定的 pnpm 安装依赖
      - name: Install dependencies
        run: pnpm install

      - name: Expo prebuild
        run: pnpm run --filter happy-app prebuild --platform android

      - name: Build Android Release APK
        run: |
          cd packages/happy-app/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: happy-app-android-apk
          path: packages/happy-app/android/app/build/outputs/apk/release/app-release.apk
