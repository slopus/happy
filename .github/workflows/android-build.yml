name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 修复 Corepack + 启用正确的包管理器
      - name: Enable Corepack & fix package manager
        run: |
          corepack enable
          yarn set version 10.11.0
          npm uninstall -g pnpm
          corepack prepare yarn@10.11.0 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Expo prebuild
        run: yarn workspace happy-app prebuild --platform android

      - name: Build Android Release APK
        run: |
          cd packages/happy-app/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: happy-app-android-apk
          path: packages/happy-app/android/app/build/outputs/apk/release/app-release.apk
