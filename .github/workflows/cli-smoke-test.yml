name: CLI Smoke Test

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/huppy-cli/**'
      - '.github/workflows/cli-smoke-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/huppy-cli/**'
      - '.github/workflows/cli-smoke-test.yml'
  workflow_dispatch:

jobs:
  smoke-test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 24]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'
        cache-dependency-path: yarn.lock

    - name: Install dependencies
      run: yarn install --immutable

    - name: Build package
      run: yarn workspace huppy-ai build

    - name: Pack package
      run: yarn workspace huppy-ai pack

    - name: Install packed package globally
      run: |
        PACKAGE_FILE=$(ls packages/huppy-cli/*.tgz)
        npm install -g "./$PACKAGE_FILE"

    - name: Test binary execution
      run: |
        # Test that the binary starts successfully
        echo "Testing huppy --help..."
        timeout 30s huppy --help || {
          echo "Error: huppy --help failed or timed out"
          exit 1
        }

        echo "Testing huppy --version..."
        timeout 10s huppy --version || {
          echo "Error: huppy --version failed or timed out"
          exit 1
        }

        echo "Testing huppy doctor..."
        timeout 30s huppy doctor || {
          echo "Error: huppy doctor failed or timed out"
          exit 1
        }

        echo "Testing huppy daemon status..."
        timeout 10s huppy daemon status || {
          echo "Error: huppy daemon status failed or timed out"
          exit 1
        }

        echo "Smoke test passed on Linux!"

  smoke-test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [20, 24]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'
        cache-dependency-path: yarn.lock

    - name: Install dependencies
      run: yarn install --immutable

    - name: Build package
      run: yarn workspace huppy-ai build

    - name: Pack package
      run: yarn workspace huppy-ai pack

    - name: Install packed package globally
      shell: cmd
      run: |
        for %%f in (packages\huppy-cli\*.tgz) do npm install -g "%%f"

    - name: Debug npm global installation structure
      shell: cmd
      run: |
        for /f "tokens=*" %%i in ('npm config get prefix') do set NPM_PREFIX=%%i
        echo NPM_PREFIX: %NPM_PREFIX%
        echo Listing npm prefix directory:
        dir "%NPM_PREFIX%" 2>nul || echo Failed to list NPM_PREFIX
        echo.
        echo Checking for node_modules in npm prefix:
        if exist "%NPM_PREFIX%\node_modules" (
          echo Found node_modules directory
          dir "%NPM_PREFIX%\node_modules" 2>nul
          echo.
          echo Checking for happy package:
          if exist "%NPM_PREFIX%\node_modules\huppy-ai" (
            echo Found happy package
            dir "%NPM_PREFIX%\node_modules\huppy-ai" 2>nul
            echo.
            echo Checking for dist directory:
            if exist "%NPM_PREFIX%\node_modules\huppy-ai\dist" (
              echo Found dist directory
              dir "%NPM_PREFIX%\node_modules\huppy-ai\dist" 2>nul
            ) else (
              echo No dist directory found
            )
          ) else (
            echo No happy package found
          )
        ) else (
          echo No node_modules directory found
        )

    - name: Test binary execution
      shell: cmd
      run: |
        @echo on

        rem Get npm global prefix and add to PATH
        for /f "tokens=*" %%i in ('npm config get prefix') do set NPM_PREFIX=%%i
        set PATH=%NPM_PREFIX%;%PATH%
        echo NPM_PREFIX: %NPM_PREFIX%
        echo Current PATH: %PATH%

        rem Debug: Check if happy exists in various locations
        echo Checking for happy binary...
        where happy 2>nul && echo Found happy in PATH || echo happy not found in PATH
        if exist "%NPM_PREFIX%\huppy.cmd" echo Found huppy.cmd in NPM_PREFIX
        if exist "%NPM_PREFIX%\node_modules\.bin\huppy.cmd" echo Found huppy.cmd in .bin directory
        dir "%NPM_PREFIX%\*happy*" 2>nul || echo No happy files found in NPM_PREFIX

        rem Debug: Check the actual contents and encoding of the installed file
        if exist "%NPM_PREFIX%\huppy.cmd" (
          echo File size and type:
          dir "%NPM_PREFIX%\huppy.cmd"
          echo.
          echo First few lines of the file:
          type "%NPM_PREFIX%\huppy.cmd" | head -5
          echo.
          echo Hex dump of first 50 bytes to check line endings:
          powershell -Command "Get-Content '%NPM_PREFIX%\huppy.cmd' -Encoding Byte -TotalCount 50 | ForEach-Object { '{0:X2}' -f $_ } | Join-String -Separator ' '"
          echo.
          echo Testing with direct path...
          "%NPM_PREFIX%\huppy.cmd" --help
        ) else (
          echo Testing huppy --help...
          huppy --help
        )
        if errorlevel 1 (
          echo Error: huppy --help failed
          exit /b 1
        )

        rem Test version
        if exist "%NPM_PREFIX%\huppy.cmd" (
          "%NPM_PREFIX%\huppy.cmd" --version
        ) else (
          huppy --version
        )
        if errorlevel 1 (
          echo Error: huppy --version failed
          exit /b 1
        )

        rem Test doctor
        echo Testing huppy doctor...
        if exist "%NPM_PREFIX%\huppy.cmd" (
          "%NPM_PREFIX%\huppy.cmd" doctor
        ) else (
          huppy doctor
        )
        if errorlevel 1 (
          echo Error: huppy doctor failed
          exit /b 1
        )

        rem Test daemon status
        echo Testing huppy daemon status...
        if exist "%NPM_PREFIX%\huppy.cmd" (
          "%NPM_PREFIX%\huppy.cmd" daemon status
        ) else (
          huppy daemon status
        )
        if errorlevel 1 (
          echo Error: huppy daemon status failed
          exit /b 1
        )

        echo Smoke test passed on Windows!

# We don't need a smoke test for macOS because most contributors are developing on macOS.
