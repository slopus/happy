name: Release Android (EAS build)

# Tag-triggered Android build via Expo Application Services (EAS Build).
# Produces an AAB (Play Store) and an APK (direct install / sideload) and
# attaches them to the GitHub Release created by the desktop workflow.
#
# Required secrets (see happy-setup/CI-CD-SECRETS.md):
#   EXPO_TOKEN           Robot/owner token from https://expo.dev/accounts/<you>/settings/access-tokens
#                        (needs "build" permission on the happy-app project)
#
# EAS-side configuration:
#   Configure Android keystore in EAS once: `eas credentials -p android`
#   (EAS stores the keystore for you; no need to add it to GitHub).
#
# The runtime server-config UI added in this version means the Play Store APK
# can be pointed at any custom happy server post-install via Settings → Server.

on:
    push:
        tags:
            - 'v*.*.*'
    workflow_dispatch:
        inputs:
            tag:
                description: 'Existing tag to build (e.g. v1.0.0)'
                required: true
                type: string
            profile:
                description: 'EAS build profile'
                required: false
                default: 'production'
                type: choice
                options:
                    - production
                    - preview
                    - development

jobs:
    build-android:
        permissions:
            contents: write
        runs-on: ubuntu-latest
        timeout-minutes: 60
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.tag || github.ref }}

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install Expo CLI
              run: npm install -g eas-cli@latest

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Verify EAS auth
              env:
                  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
              run: |
                  if [ -z "$EXPO_TOKEN" ]; then
                      echo "::error::EXPO_TOKEN secret is required. See happy-setup/CI-CD-SECRETS.md."
                      exit 1
                  fi
                  cd packages/happy-app
                  eas whoami

            # EAS cloud builds don't support --output (that's local-build only).
            # We submit the build, wait for it to finish, then curl the
            # artifact URL from the JSON result. Each build produces one
            # platform×profile file — AAB for the Play-Store profile, APK
            # for the preview profile.
            - name: Build AAB (Play Store) on EAS
              env:
                  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
              run: |
                  cd packages/happy-app
                  eas build \
                    --platform android \
                    --profile ${{ inputs.profile || 'production' }} \
                    --non-interactive \
                    --wait \
                    --json > /tmp/eas-aab.json
                  URL=$(jq -r '.[0].artifacts.applicationArchiveUrl // empty' /tmp/eas-aab.json)
                  if [ -z "$URL" ]; then
                      echo "::error::No artifact URL in EAS build output. Dump:"
                      cat /tmp/eas-aab.json
                      exit 1
                  fi
                  curl -fsSL -o $GITHUB_WORKSPACE/happy-android.aab "$URL"
                  ls -la $GITHUB_WORKSPACE/happy-android.aab

            - name: Build APK (sideload) on EAS
              env:
                  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
              run: |
                  cd packages/happy-app
                  # `preview` profile is expected to set buildType=apk in
                  # eas.json. If your eas.json doesn't have one, EAS will
                  # error here — see CI-CD-SECRETS.md for a starter eas.json.
                  eas build \
                    --platform android \
                    --profile preview \
                    --non-interactive \
                    --wait \
                    --json > /tmp/eas-apk.json
                  URL=$(jq -r '.[0].artifacts.applicationArchiveUrl // empty' /tmp/eas-apk.json)
                  if [ -z "$URL" ]; then
                      echo "::error::No artifact URL in EAS preview-build output. Dump:"
                      cat /tmp/eas-apk.json
                      exit 1
                  fi
                  curl -fsSL -o $GITHUB_WORKSPACE/happy-android.apk "$URL"
                  ls -la $GITHUB_WORKSPACE/happy-android.apk

            - name: Upload to GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ inputs.tag || github.ref_name }}
                  files: |
                      happy-android.aab
                      happy-android.apk
                  draft: true
                  fail_on_unmatched_files: true
                  body: |
                      Android artifacts. Desktop builds (macOS .dmg / Windows .msi)
                      are uploaded by the release-desktop workflow.
