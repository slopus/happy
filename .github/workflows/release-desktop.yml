name: Release desktop (macOS + Windows)

# Tag-triggered build of the Tauri desktop app.
# Builds macOS .dmg and Windows .msi / .exe in parallel and uploads them to a
# GitHub Release named after the tag. Signing is conditional: if the relevant
# secrets are set, artifacts get signed/notarized; otherwise they're produced
# unsigned (users see a SmartScreen warning on Windows / Gatekeeper prompt on
# macOS).
#
# Required secrets (see happy-setup/CI-CD-SECRETS.md):
#   macOS:
#     APPLE_CERTIFICATE              base64-encoded Developer ID Application .p12
#     APPLE_CERTIFICATE_PASSWORD     password for the .p12
#     APPLE_SIGNING_IDENTITY         "Developer ID Application: NAME (TEAMID)"
#     APPLE_ID                       Apple ID email
#     APPLE_PASSWORD                 app-specific password
#     APPLE_TEAM_ID                  10-char team ID
#   Windows (optional):
#     WINDOWS_CERTIFICATE            base64-encoded code-signing .pfx
#     WINDOWS_CERTIFICATE_PASSWORD   password for the .pfx

on:
    push:
        tags:
            - 'v*.*.*'
    workflow_dispatch:
        inputs:
            tag:
                description: 'Existing tag to build (e.g. v1.0.0)'
                required: true
                type: string

jobs:
    build:
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: 'macos-latest'
                      args: ''
                    - platform: 'windows-latest'
                      args: ''
        runs-on: ${{ matrix.platform }}
        timeout-minutes: 60
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.tag || github.ref }}

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Cache Rust
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: packages/happy-app/src-tauri

            - name: Install Linux deps (skipped — no linux runner here)
              if: matrix.platform == 'never'
              run: true

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # Signing env vars are forwarded to tauri-action ONLY when all
            # required secrets are non-empty. GitHub Actions evaluates missing
            # secrets to "" rather than unsetting them, which some versions of
            # tauri-action mis-detect as "signing requested → attempt import"
            # → fails with `security: SecKeychainItemImport`. We gate via a
            # script step that writes to $GITHUB_ENV (or skips) so the
            # downstream env block sees true unset values when secrets are
            # missing.
            - name: Configure macOS signing
              if: matrix.platform == 'macos-latest'
              shell: bash
              env:
                  IN_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  IN_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  IN_APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
                  IN_APPLE_ID: ${{ secrets.APPLE_ID }}
                  IN_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
                  IN_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              run: |
                  if [ -z "$IN_APPLE_CERTIFICATE" ] || [ -z "$IN_APPLE_CERTIFICATE_PASSWORD" ] \
                     || [ -z "$IN_APPLE_SIGNING_IDENTITY" ] || [ -z "$IN_APPLE_ID" ] \
                     || [ -z "$IN_APPLE_PASSWORD" ] || [ -z "$IN_APPLE_TEAM_ID" ]; then
                      echo "macOS signing disabled — one or more Apple secrets not set"
                      exit 0
                  fi
                  echo "macOS signing enabled"
                  {
                      echo "APPLE_CERTIFICATE<<EOF_APPLE_CERT"
                      printf '%s\n' "$IN_APPLE_CERTIFICATE"
                      echo "EOF_APPLE_CERT"
                      echo "APPLE_CERTIFICATE_PASSWORD=$IN_APPLE_CERTIFICATE_PASSWORD"
                      echo "APPLE_SIGNING_IDENTITY=$IN_APPLE_SIGNING_IDENTITY"
                      echo "APPLE_ID=$IN_APPLE_ID"
                      echo "APPLE_PASSWORD=$IN_APPLE_PASSWORD"
                      echo "APPLE_TEAM_ID=$IN_APPLE_TEAM_ID"
                  } >> "$GITHUB_ENV"

            - name: Configure Windows signing
              if: matrix.platform == 'windows-latest'
              shell: bash
              env:
                  IN_WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
                  IN_WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
              run: |
                  if [ -z "$IN_WINDOWS_CERTIFICATE" ] || [ -z "$IN_WINDOWS_CERTIFICATE_PASSWORD" ]; then
                      echo "Windows signing disabled — secrets not set"
                      exit 0
                  fi
                  echo "Windows signing enabled"
                  {
                      echo "TAURI_SIGNING_PRIVATE_KEY<<EOF_WIN_KEY"
                      printf '%s\n' "$IN_WINDOWS_CERTIFICATE"
                      echo "EOF_WIN_KEY"
                      echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$IN_WINDOWS_CERTIFICATE_PASSWORD"
                  } >> "$GITHUB_ENV"

            - name: Build Tauri app
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  projectPath: packages/happy-app
                  tauriScript: pnpm tauri
                  configPath: src-tauri/tauri.conf.json
                  tagName: ${{ inputs.tag || github.ref_name }}
                  releaseName: 'Happy ${{ inputs.tag || github.ref_name }}'
                  releaseBody: |
                      Desktop builds. Android APK + AAB are uploaded by the release-android workflow.
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.args }}
