apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - postgres.yaml
  - secrets.yaml

# Use locally-built image instead of private registry
images:
  - name: docker.korshakov.com/handy-server
    newName: happy-server
    newTag: local

# Patch: 2 replicas + remove ExternalSecret (not available locally)
patches:
  # Scale to 2 replicas for multi-process testing
  - target:
      kind: Deployment
      name: handy-server
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

  # Remove S3_PUBLIC_URL (using local file storage)
  - target:
      kind: Deployment
      name: handy-server
    patch: |-
      - op: remove
        path: /spec/template/spec/containers/0/env/3

  # Remove ExternalSecret — we use plain Secret instead
  - target:
      kind: ExternalSecret
      name: handy-secrets
    patch: |-
      $patch: delete
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: handy-secrets
