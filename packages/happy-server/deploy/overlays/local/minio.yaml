apiVersion: v1
kind: Service
metadata:
  name: happy-minio
spec:
  ports:
  - port: 9000
    name: api
  - port: 9001
    name: console
  selector:
    app: happy-minio
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: happy-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: happy-minio
  template:
    metadata:
      labels:
        app: happy-minio
    spec:
      initContainers:
      - name: init-bucket
        image: busybox
        command: ["mkdir", "-p", "/data/happy"]
        volumeMounts:
        - name: minio-data
          mountPath: /data
      containers:
      - name: minio
        image: minio/minio
        args: ["server", "/data", "--console-address", ":9001"]
        ports:
        - containerPort: 9000
          name: api
        - containerPort: 9001
          name: console
        env:
        - name: MINIO_ROOT_USER
          value: minioadmin
        - name: MINIO_ROOT_PASSWORD
          value: minioadmin
        volumeMounts:
        - name: minio-data
          mountPath: /data
      volumes:
      - name: minio-data
        emptyDir: {}
