apiVersion: apps/v1
kind: Deployment
metadata:
  name: handy-server
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  # replicas: 1 is safe for single-process mode.
  # replicas: 2+ is now supported with Redis backplane + S3 file storage.
  # Prerequisites for multi-pod:
  #   - REDIS_URL must be set (enables cross-process event delivery and RPC)
  #   - S3_HOST must be set (enables shared file storage across pods)
  #   - DB_PROVIDER must be postgres (PGlite is single-process only)
  # See docs/plans/multiprocess-architecture.md for full architecture details.
  replicas: 1
  selector:
    matchLabels:
      app: handy-server
  template:
    metadata:
      labels:
        app: handy-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        # Optional: session affinity reduces cross-process hops for WebSocket connections.
        # Not required for correctness — all clients use transports: ['websocket'] and the
        # backplane handles cross-process event delivery and RPC forwarding.
        # nginx.ingress.kubernetes.io/affinity: "cookie"
        # nginx.ingress.kubernetes.io/session-cookie-name: "HAPPYROUTE"
        # nginx.ingress.kubernetes.io/session-cookie-max-age: "3600"
    spec:
      # Allow 15 seconds for clean shutdown: backplane disconnect, RPC registry cleanup,
      # and in-flight request completion before SIGKILL.
      terminationGracePeriodSeconds: 15
      containers:
      - name: handy
        image: docker.korshakov.com/handy-server:{version}
        ports:
        - containerPort: 3005
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "3005"
        - name: REDIS_URL
          value: redis://happy-redis:6379
        - name: S3_PUBLIC_URL
          value: https://files.cluster-fluster.com/happy
        envFrom:
        - secretRef:
            name: handy-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: handy-server-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: handy-server
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: handy-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: handy-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /handy-db
    - extract:
        key: /handy-master
    - extract:
        key: /handy-github
    - extract:
        key: /handy-files
    - extract:
        key: /handy-e2b
    - extract:
        key: /handy-revenuecat
    - extract:
        key: /handy-elevenlabs
---
apiVersion: v1
kind: Service
metadata:
  name: handy-server
spec:
  selector:
    app: handy-server
  ports:
  - port: 3000
    targetPort: 3005
  type: ClusterIP