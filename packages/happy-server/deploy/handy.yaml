apiVersion: apps/v1
kind: Deployment
metadata:
  name: handy-server
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 2
  replicas: 3
  selector:
    matchLabels:
      app: handy-server
  template:
    metadata:
      labels:
        app: handy-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: handy
        image: docker.korshakov.com/handy-server:{version}
        ports:
        - containerPort: 3005
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "3005"
        - name: REDIS_URL
          value: redis://happy-redis:6379
        - name: S3_PUBLIC_URL
          value: https://files.cluster-fluster.com/happy
        envFrom:
        - secretRef:
            name: handy-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: handy-server-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: handy-server
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: handy-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: handy-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /handy-db
    - extract:
        key: /handy-master
    - extract:
        key: /handy-github
    - extract:
        key: /handy-files
    - extract:
        key: /handy-e2b
    - extract:
        key: /handy-revenuecat
    - extract:
        key: /handy-elevenlabs
---
apiVersion: v1
kind: Service
metadata:
  name: handy-server
spec:
  selector:
    app: handy-server
  ports:
  - port: 3000
    targetPort: 3005
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: happy-redis
  labels:
    app: happy-redis
spec:
  ports:
  - port: 6379
    name: redis
  selector:
    app: happy-redis
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: happy-redis-config
data:
  redis.conf: |
    dir /data
    appendonly yes
    appendfsync everysec
    save 900 1
    save 300 10
    save 60 10000
    maxmemory-policy noeviction
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: happy-redis
spec:
  serviceName: happy-redis
  replicas: 1
  selector:
    matchLabels:
      app: happy-redis
  template:
    metadata:
      labels:
        app: happy-redis
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command:
          - redis-server
          - "/etc/redis/redis.conf"
        ports:
        - containerPort: 6379
          name: redis
        volumeMounts:
        - name: redis-data
          mountPath: /data
        - name: redis-config
          mountPath: /etc/redis
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 2Gi
      - name: redis-exporter
        image: oliver006/redis_exporter:v1.67.0-alpine
        ports:
        - containerPort: 9121
          name: metrics
        env:
        - name: REDIS_ADDR
          value: "redis://localhost:6379"
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
      volumes:
      - name: redis-config
        configMap:
          name: happy-redis-config
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi