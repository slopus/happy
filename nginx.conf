server {
    listen 80;
    absolute_redirect off;

    location /_expo/ {
        root   /usr/share/nginx/html;
        try_files $uri =404;
    }

    location /assets/ {
        root   /usr/share/nginx/html;
        # Try local file first; if not found, proxy to happy-server (dev-server)
        try_files $uri @assets_proxy;
    }

    location @assets_proxy {
        resolver 127.0.0.11 valid=30s;
        set $backend "http://llmchat-server:3005";
        proxy_pass $backend/v1/preview/http/localhost:8082$request_uri;
        proxy_set_header Host $host;
    }

    location /.well-known/ {
        root   /usr/share/nginx/html;
        try_files $uri =404;
    }

    # Standalone monitor page — serves static HTML, no SPA fallback
    location /monitor {
        root   /usr/share/nginx/html;
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Handle server validation: Accept: text/plain at root returns welcome text
    location = / {
        root /usr/share/nginx/html;
        if ($http_accept ~* "text/plain") {
            add_header Content-Type "text/plain; charset=utf-8";
            add_header Access-Control-Allow-Origin "*";
            return 200 "Welcome to Happy Server!";
        }
        index index.html index.htm;
        try_files $uri $uri.html $uri/index.html $uri/index.htm $uri/ /index.html /index.htm =404;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri.html $uri/index.html $uri/index.htm $uri/ /index.html /index.htm =404;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        try_files $uri @redirect_to_index;
        internal;
    }

    error_page 404 = @handle_404;

    location @handle_404 {
        root /usr/share/nginx/html;
        try_files /404.html @redirect_to_index;
        internal;
    }

    location @redirect_to_index {
        return 302 /;
    }
}
