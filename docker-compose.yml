services:
  happy-app:
    build:
      context: .
      dockerfile: Dockerfile.webapp
    ports:
      - "3030:80"
    restart: unless-stopped
    environment:
      # API server (separate origin; do not use path reverse proxy)
      - EXPO_PUBLIC_HAPPY_SERVER_URL=${EXPO_PUBLIC_HAPPY_SERVER_URL:-http://localhost:3031}
      # ElevenLabs
      - EXPO_PUBLIC_ELEVENLABS_AGENT_ID=${ELEVENLABS_AGENT_ID}
      # Voice Gateway
      - EXPO_PUBLIC_VOICE_PROVIDER=${EXPO_PUBLIC_VOICE_PROVIDER:-happy-voice}
      - EXPO_PUBLIC_VOICE_BASE_URL=${EXPO_PUBLIC_VOICE_BASE_URL:-http://localhost:3040}
      # For docker-compose, happy-voice must call happy-server by container DNS, not host localhost.
      - EXPO_PUBLIC_VOICE_TOOL_BRIDGE_BASE_URL=${EXPO_PUBLIC_VOICE_TOOL_BRIDGE_BASE_URL:-http://happy-server:3031}
      - EXPO_PUBLIC_VOICE_PUBLIC_KEY=${VOICE_PUBLIC_KEY:-dev-voice-public-key}

  happy-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3031:3031"
    restart: unless-stopped
    environment:
      # Server
      - NODE_ENV=production
      - PORT=3031
      - HANDY_MASTER_SECRET=${HANDY_MASTER_SECRET}
      - APP_URL=${APP_URL:-http://localhost:3030}
      # Database
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Redis
      - REDIS_URL=redis://redis:6379
      # S3 / MinIO
      - S3_HOST=minio
      - S3_PORT=9000
      - S3_USE_SSL=false
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
      # GitHub App
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_REDIRECT_URL=${GITHUB_REDIRECT_URL}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY}
      # Voice tool bridge
      - VOICE_TOOL_BRIDGE_KEY=${VOICE_TOOL_BRIDGE_KEY:-dev-voice-bridge-key}
    depends_on:
      - minio
      - postgres
      - redis
      
  happy-voice:
    build:
      context: ./packages/happy-voice
      dockerfile: Dockerfile
    command: ["yarn", "start:all"]
    ports:
      - "3040:3040"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3040
      - VOICE_PUBLIC_KEY=${VOICE_PUBLIC_KEY:-dev-voice-public-key}
      - LIVEKIT_URL=${LIVEKIT_URL:-http://localhost:7880}
      - LIVEKIT_WS_URL=${LIVEKIT_WS_URL:-ws://localhost:7880}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-devsecret}
      - LIVEKIT_AGENT_NAME=${LIVEKIT_AGENT_NAME:-happy-voice-agent}
      - LIVEKIT_ROOM_TTL_SECONDS=${LIVEKIT_ROOM_TTL_SECONDS:-3600}
      - LIVEKIT_TOKEN_TTL_SECONDS=${LIVEKIT_TOKEN_TTL_SECONDS:-600}
      - AGENT_STT=${AGENT_STT:-assemblyai/universal-streaming:en}
      - AGENT_LLM=${AGENT_LLM:-openai/gpt-4.1-mini}
      - AGENT_TTS=${AGENT_TTS:-cartesia/sonic-3:9626c31c-bec5-4cca-baa8-f8ba9e84c8bc}
      - AGENT_WELCOME_MESSAGE=${AGENT_WELCOME_MESSAGE:-Say hello and ask what the user wants to build.}
      - AGENT_READY_PLAYOUT_MODE=${AGENT_READY_PLAYOUT_MODE:-best_effort}
      - AGENT_READY_SUMMARY_MODEL=${AGENT_READY_SUMMARY_MODEL:-}
      - AGENT_READY_SUMMARY_TIMEOUT_MS=${AGENT_READY_SUMMARY_TIMEOUT_MS:-7000}
      - AGENT_READY_SUMMARY_INPUT_MAX_CHARS=${AGENT_READY_SUMMARY_INPUT_MAX_CHARS:-2200}
      - AGENT_MIN_ENDPOINTING_DELAY_MS=${AGENT_MIN_ENDPOINTING_DELAY_MS:-1600}
      - AGENT_MAX_ENDPOINTING_DELAY_MS=${AGENT_MAX_ENDPOINTING_DELAY_MS:-7000}
      - AGENT_LOG_LLM_IO=${AGENT_LOG_LLM_IO:-true}
      - PROMPT_VOICE_MAIN_FILE=${PROMPT_VOICE_MAIN_FILE:-prompts/voice-main.system.txt}
      - PROMPT_VOICE_TOOL_FOLLOWUP_FILE=${PROMPT_VOICE_TOOL_FOLLOWUP_FILE:-prompts/voice-tool-followup.system.txt}
      - PROMPT_VOICE_READY_SUMMARY_FILE=${PROMPT_VOICE_READY_SUMMARY_FILE:-prompts/voice-ready-summary.system.txt}
      - PROMPT_RECENT_VOICE_MESSAGES=${PROMPT_RECENT_VOICE_MESSAGES:-12}
      - PROMPT_RECENT_APP_CONTEXT_MESSAGES=${PROMPT_RECENT_APP_CONTEXT_MESSAGES:-12}
      - PROMPT_RECENT_MAX_CHARS=${PROMPT_RECENT_MAX_CHARS:-6000}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY}
      - TOOL_BRIDGE_BASE_URL=${TOOL_BRIDGE_BASE_URL:-http://happy-server:3031}
      - TOOL_BRIDGE_API_KEY=${VOICE_TOOL_BRIDGE_KEY:-dev-voice-bridge-key}
      - LOG_LEVEL=${HAPPY_VOICE_WORKER_LOG_LEVEL:-info}

  minio:
    image: minio/minio
    command: server /data
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
    ports:
      - "3050:9000"
    volumes:
      - minio_data:/data

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
